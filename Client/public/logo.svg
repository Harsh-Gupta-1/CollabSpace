<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Container (Optional) -->
  <rect width="200" height="200" rx="12" fill="#0E0E0E"/>
  
  <!-- Outer Frame / Workspace -->
  <rect x="50" y="50" width="100" height="100" stroke="#00F5D4" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Inner Node / Connector -->
  <rect x="75" y="75" width="40" height="40" stroke="#00F5D4" stroke-width="2" stroke-dasharray="4 4"/>
  
  <!-- The "Kinetic" Cursor / Connectivity Point -->
  <path d="M105 105L135 135M135 135L120 135M135 135L135 120" stroke="#00F5D4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Accent Dots (Engineering Precision) -->
  <circle cx="50" cy="50" r="2" fill="#00F5D4"/>
  <circle cx="150" cy="50" r="2" fill="#00F5D4"/>
  <circle cx="50" cy="150" r="2" fill="#00F5D4"/>
  <circle cx="150" cy="150" r="2" fill="#00F5D4"/>
</svg>
